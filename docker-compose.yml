services:
  sofa:
    image: ghcr.io/jakejarvis/sofa:edge
    container_name: sofa
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - sofa-data:/data
    environment:
      - TMDB_API_READ_ACCESS_TOKEN=${TMDB_API_READ_ACCESS_TOKEN}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}

volumes:
  sofa-data:
