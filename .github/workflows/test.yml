name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Expo types
        run: bunx expo customize tsconfig.json
        working-directory: ./apps/native

      - name: Lint
        run: bunx turbo run lint

      - name: Format check
        run: bunx turbo run format:check

      - name: Type check
        run: bunx turbo run check-types

      - name: Run tests
        run: bunx turbo run test -- --coverage --coverage-reporter=lcov
